name: Keep backend awake

# Ping le backend Render toutes les 5 min pour éviter le cold start (free tier
# s'endort après 15 min d'inactivité). Réutilise la variable `VITE_API_URL`
# déjà définie au niveau du repo (utilisée par deploy-frontend.yml).
#
# Note : GitHub peut retarder les workflows planifiés de quelques minutes
# en heures de pointe — sans impact ici, on reste largement sous les 15 min.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /api/health
        env:
          API_URL: ${{ vars.VITE_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::Variable VITE_API_URL non définie sur le repo (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          echo "Ping $API_URL/api/health"
          # --retry pour absorber un cold start éventuel (3 retries, 5s entre chaque)
          # --retry-all-errors couvre les 5xx (Render qui démarre)
          curl -fsS \
               --retry 3 --retry-delay 5 --retry-all-errors \
               --max-time 30 \
               -w "\nHTTP %{http_code} en %{time_total}s\n" \
               "$API_URL/api/health"
